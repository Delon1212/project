<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Edit Akun</title>
    <link rel="stylesheet" href="css/logreg.css">
</head>
<body>

<div  class="container">
    <div class="form-box">
        <form class="form active">
            <h2>Edit Profile</h2>
            <label>Ganti Username</label>
            <input id="username">
            <label>Ganti Email</label>
            <input id="email">
            <label>Ganti Password</label>
            <input type="password" id="password" placeholder="Password baru (opsional)">
            <button onclick="updateAccount(event)" class="btn">Simpan Akun</button>
            <p class="switch"><a href="profile.html">Kembali</a></p>
    </div>
</div>

<script src="js/profile.js"></script>


</body>
</html>
